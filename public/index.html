    <style>
      #loader-wrapper {
        position: fixed;
        inset: 0;
        background: #050508;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      .loader-logo {
        width: 180px;
        height: 180px;
        border: 2px solid #1e40af;
        border-radius: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        margin-bottom: 48px;
        animation: pulse 2s infinite ease-in-out;
      }
      .loader-logo::before {
        content: "";
        position: absolute;
        inset: -16px;
        border: 1px solid rgba(30, 64, 175, 0.2);
        border-radius: 40px;
        animation: rotate 4s linear infinite;
      }
      .loader-bar {
        width: 240px;
        height: 3px;
        background: rgba(255,255,255,0.05);
        position: relative;
        overflow: hidden;
      }
      .loader-progress {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        background: #3b82f6;
        animation: shift 1.5s infinite linear;
      }
      .loader-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        color: #3b82f6;
        text-transform: uppercase;
        letter-spacing: 0.5em;
        margin-top: 20px;
        opacity: 0.6;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); border-color: #1e40af; }
        50% { transform: scale(1.05); border-color: #3b82f6; }
      }
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes shift {
        from { transform: translateX(-100%); }
        to { transform: translateX(300%); }
      }
      body.loaded #loader-wrapper {
        opacity: 0;
        visibility: hidden;
      }
    </style>
